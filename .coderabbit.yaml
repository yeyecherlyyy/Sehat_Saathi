# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "src/**"
      instructions: |
        FRONTEND REVIEW CHECKLIST — Focus on these critical areas:

        1. **Auth Race Conditions (CRITICAL)**:
           - Check ALL logout handlers: `logout()` must NEVER be called before `navigate('/')`.
           - `window.location.href` must NEVER be used for logout navigation — it causes a full page reload that destroys the JS execution context, preventing localStorage cleanup.
           - The correct pattern is: `navigate('/'); setTimeout(logout, 100);`
           - Flag any component that calls `setUser(null)` or clears auth state before navigating away.

        2. **Route Guard Consistency**:
           - Verify that `ProtectedRoute` or inline route guards (`user?.role === 'x' ? <Component /> : <Navigate />`) handle the `loading` state properly.
           - Ensure no route guard redirects to `/login` when the user is logging out intentionally.

        3. **Missing Imports**:
           - Any component using `navigate()` must import `useNavigate` from 'react-router-dom'.
           - Check that all lucide-react icons, framer-motion, and recharts imports are actually used.

        4. **API Error Handling**:
           - All `fetch()` and `authFetch()` calls should have proper `.catch()` handlers.
           - 401 responses should trigger logout, not leave the user in a broken state.

    - path: "server/**"
      instructions: |
        BACKEND REVIEW CHECKLIST — Focus on these critical areas:

        1. **Token/Session Security**:
           - JWT_SECRET should come from environment variables in production, not be hardcoded.
           - Token expiry should be reasonable (not infinite).
           - The `/api/auth/me` endpoint must validate the token properly.

        2. **Database Operations**:
           - All db operations should handle the case where the table or record doesn't exist.
           - The in-memory DataStore is for demo only — flag any patterns that would break with a real DB.

        3. **Static File Serving**:
           - The `dist/` directory serving MUST be guarded with `existsSync()`.
           - The catch-all `app.get('*')` route must NOT intercept `/api` or `/socket.io` paths.

        4. **CORS & Security Headers**:
           - `cors({ origin: '*' })` is fine for demo but should be flagged for production.
           - Verify security headers are set (X-Content-Type-Options, X-Frame-Options, etc.).

    - path: "package.json"
      instructions: |
        DEPENDENCY REVIEW:
        - Verify ALL imports used in `src/` and `server/` are listed in dependencies.
        - The `dev` script should use `concurrently` to run both Vite and the Express server.
        - The `start` script should only start the server (for production after `build`).
        - Check for missing peer dependencies.

    - path: "vite.config.js"
      instructions: |
        VITE CONFIG REVIEW:
        - Verify proxy configuration matches the backend port (default 3001).
        - Ensure `/api` and `/socket.io` paths are proxied to the backend.
        - Check that WebSocket proxy has `ws: true` set.
